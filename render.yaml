services:
  - type: web
    name: salguacate-backend
    env: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_DATABASE_PATH
        value: /opt/render/project/src/server/persistent/database.sqlite
      - key: UPLOADS_DIR
        value: /opt/render/project/src/server/persistent/uploads
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/server/persistent
      sizeGB: 1
        
  - type: web
    name: salguacate-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://salguacate-backend.onrender.com"
